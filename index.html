<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="I-grec - Réseau Social Nouvelle Génération - Connectez-vous avec des milliers d'utilisateurs">
    <meta name="keywords" content="réseau social, communauté, I-grec">
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>I-grec - Réseau Social Nouvelle Génération</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #7c3aed;
            --secondary: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f9fafb;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-bounce {
            animation: bounce 2s infinite;
        }

        .animate-slideIn {
            animation: slideIn 0.3s ease-out;
        }

        .transition-smooth {
            transition: all 0.3s ease;
        }

        .gradient-purple {
            background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
        }

        .lazy-load {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lazy-load.loaded {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>
    <script src="js/app.js" defer></script>
</body>
</html>
