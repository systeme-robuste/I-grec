<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-grec - Réseau Social Nouvelle Génération</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce {
            animation: bounce 2s infinite;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

    <script>
        const App = {
            user: null,
            showAuth: true,
            phone: '',
            code: '',
            step: 'phone',
            activeTab: 'home',
            activeSubTab: 'bete-pro',
            showCreateModal: false,
            showBlogEditor: false,
            showForumCreator: false,
            showPhiloneisteCreator: false,
            showMessages: false,
            showNotifications: false,
            showPayment: false,
            showVideoCall: false,
            showFileUpload: false,
            showTranslator: false,
            showStories: false,
            showCreateStory: false,
            showPoll: false,
            showAnalytics: false,
            showBadges: false,
            showMarketplace: false,
            showLiveStream: false,
            showAIAssistant: false,
            videoCallActive: false,
            micMuted: false,
            cameraOff: false,
            selectedLanguage: 'fr',
            userBadges: [
                { id: 1, name: 'Pionnier', icon: '🚀', description: 'Premier utilisateur', earned: true, date: '01/01/2026' },
                { id: 2, name: 'Créateur Pro', icon: '✨', description: '100 publications', earned: true, date: '05/01/2026' },
                { id: 3, name: 'Influenceur', icon: '⭐', description: '10K abonnés', earned: false, progress: 23 },
                { id: 4, name: 'Expert IA', icon: '🤖', description: 'Utiliser l\'IA 50 fois', earned: true, date: '10/01/2026' }
            ],
            marketplaceItems: [
                { id: 1, title: 'Template Blog Pro', price: 29.99, image: '📄', seller: 'DesignStudio', rating: 4.8, sales: 234 },
                { id: 2, title: 'Pack Stickers Premium', price: 9.99, image: '🎨', seller: 'CreativeHub', rating: 4.9, sales: 567 },
                { id: 3, title: 'Thème Forum Moderne', price: 49.99, image: '🎭', seller: 'ThemeShop', rating: 4.7, sales: 123 }
            ],
            aiMessages: [
                { role: 'assistant', content: 'Bonjour ! Je suis votre assistant IA personnel. Comment puis-je vous aider aujourd\'hui ?' }
            ],
            stories: [
                { id: 1, user: 'Vous', avatar: '', hasStory: false, isYou: true },
                { id: 2, user: 'Marie D.', avatar: 'https://ui-avatars.com/api/?name=Marie+D', hasStory: true, viewed: false },
                { id: 3, user: 'Alex M.', avatar: 'https://ui-avatars.com/api/?name=Alex+M', hasStory: true, viewed: true },
                { id: 4, user: 'Sophie L.', avatar: 'https://ui-avatars.com/api/?name=Sophie+L', hasStory: true, viewed: false }
            ],
            activePoll: null,
            dailyQuota: { posts: 200, used: 15 },
            notifications: [
                { id: 1, type: 'like', user: 'Marie D.', content: 'a aimé votre publication', time: '5 min', read: false },
                { id: 2, type: 'comment', user: 'Jean M.', content: 'a commenté votre article', time: '1 h', read: false },
                { id: 3, type: 'follow', user: 'Sophie L.', content: 'a commencé à vous suivre', time: '2 h', read: true },
                { id: 4, type: 'mention', user: 'Pierre R.', content: 'vous a mentionné dans un débat', time: '3 h', read: true }
            ],
            messages: [
                { id: 1, user: 'Alex Martin', avatar: 'https://ui-avatars.com/api/?name=Alex+Martin', lastMessage: 'Salut ! Tu as vu mon dernier article ?', time: '2 min', unread: 2 },
                { id: 2, user: 'Sophie Dubois', avatar: 'https://ui-avatars.com/api/?name=Sophie+Dubois', lastMessage: 'Merci pour ton aide !', time: '1 h', unread: 0 },
                { id: 3, user: 'Forum Tech', avatar: 'https://ui-avatars.com/api/?name=Forum+Tech', lastMessage: 'Nouvelle discussion sur l\'IA', time: '3 h', unread: 5 }
            ],
            currentChat: null,
            newMessage: '',

            init() {
                const savedUser = localStorage.getItem('igrec_user');
                if (savedUser) {
                    this.user = JSON.parse(savedUser);
                    this.showAuth = false;
                }
                this.render();
            },

            renderNotifications() {
                return `
                    <div class="fixed top-16 right-4 bg-white rounded-2xl shadow-2xl w-96 max-h-[600px] overflow-hidden z-50 border border-gray-200">
                        <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                            <h3 class="font-bold text-lg">Notifications</h3>
                            <button
                                onclick="app.showNotifications = false; app.render();"
                                class="text-gray-500 hover:text-gray-700 text-xl"
                            >
                                ✕
                            </button>
                        </div>

                        <div class="overflow-y-auto max-h-[520px] divide-y divide-gray-100">
                            ${this.notifications.map(notif => {
                                const icons = {
                                    like: '❤️',
                                    comment: '💬',
                                    follow: '👤',
                                    mention: '@'
                                };
                                return `
                                    <div class="p-4 hover:bg-gray-50 transition-colors ${!notif.read ? 'bg-purple-50' : ''}">
                                        <div class="flex items-start gap-3">
                                            <span class="text-2xl">${icons[notif.type]}</span>
                                            <div class="flex-1">
                                                <p class="text-sm">
                                                    <span class="font-semibold">${notif.user}</span>
                                                    ${notif.content}
                                                </p>
                                                <p class="text-xs text-gray-500 mt-1">${notif.time}</p>
                                            </div>
                                            ${!notif.read ? `
                                                <span class="w-2 h-2 bg-purple-600 rounded-full mt-1"></span>
                                            ` : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>

                        <div class="p-3 border-t border-gray-200 text-center">
                            <button class="text-purple-600 font-semibold text-sm hover:underline">
                                Tout marquer comme lu
                            </button>
                        </div>
                    </div>
                `;
            },

            renderBadges() {
                return `
                    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
                            <div class="border-b border-gray-200 p-6 flex items-center justify-between">
                                <h2 class="text-2xl font-bold">🏆 Badges & Récompenses</h2>
                                <button
                                    onclick="app.showBadges = false; app.render();"
                                    class="text-gray-500 hover:text-gray-700 text-2xl"
                                >
                                    ✕
                                </button>
                            </div>

                            <div class="p-6">
                                <!-- Progression globale -->
                                <div class="bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-xl p-6 mb-6">
                                    <h3 class="text-xl font-bold mb-2">Niveau 12 - Expert</h3>
                                    <div class="flex items-center gap-4 mb-2">
                                        <div class="flex-1 bg-white bg-opacity-30 rounded-full h-3">
                                            <div class="bg-white h-3 rounded-full" style="width: 65%"></div>
                                        </div>
                                        <span class="font-semibold">65%</span>
                                    </div>
                                    <p class="text-sm opacity-90">350 XP jusqu'au niveau 13</p>
                                </div>

                                <!-- Badges obtenus -->
                                <div class="mb-8">
                                    <h3 class="font-bold text-lg mb-4">Badges obtenus (${this.userBadges.filter(b => b.earned).length})</h3>
                                    <div class="grid md:grid-cols-3 gap-4">
                                        ${this.userBadges.filter(b => b.earned).map(badge => `
                                            <div class="bg-gradient-to-br from-yellow-50 to-orange-50 border-2 border-yellow-300 rounded-xl p-6 text-center hover:scale-105 transition-transform cursor-pointer">
                                                <div class="text-6xl mb-3">${badge.icon}</div>
                                                <h4 class="font-bold text-lg mb-1">${badge.name}</h4>
                                                <p class="text-sm text-gray-600 mb-2">${badge.description}</p>
                                                <p class="text-xs text-gray-500">Obtenu le ${badge.date}</p>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>

                                <!-- Badges à débloquer -->
                                <div>
                                    <h3 class="font-bold text-lg mb-4">Badges à débloquer</h3>
                                    <div class="grid md:grid-cols-3 gap-4">
                                        ${this.userBadges.filter(b => !b.earned).map(badge => `
                                            <div class="bg-gray-50 border-2 border-gray-200 rounded-xl p-6 text-center relative">
                                                <div class="text-6xl mb-3 opacity-30">${badge.icon}</div>
                                                <h4 class="font-bold text-lg mb-1">${badge.name}</h4>
                                                <p class="text-sm text-gray-600 mb-3">${badge.description}</p>
                                                <div class="w-full bg-gray-200 rounded-full h-2">
                                                    <div class="bg-purple-600 h-2 rounded-full" style="width: ${badge.progress}%"></div>
                                                </div>
                                                <p class="text-xs text-gray-500 mt-1">${badge.progress}% complété</p>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>

                                <!-- Récompenses -->
                                <div class="mt-8 bg-purple-50 border border-purple-200 rounded-xl p-6">
                                    <h3 class="font-bold text-lg mb-4">🎁 Récompenses disponibles</h3>
                                    <div class="grid md:grid-cols-2 gap-4">
                                        ${[
                                            { title: '1 mois Premium gratuit', cost: 500, icon: '👑' },
                                            { title: 'Badge personnalisé', cost: 300, icon: '⭐' },
                                            { title: 'Stickers exclusifs', cost: 150, icon: '🎨' },
                                            { title: 'Mise en avant 7 jours', cost: 400, icon: '📢' }
                                        ].map(reward => `
                                            <div class="bg-white rounded-lg p-4 flex items-center justify-between">
                                                <div class="flex items-center gap-3">
                                                    <span class="text-3xl">${reward.icon}</span>
                                                    <div>
                                                        <h4 class="font-semibold">${reward.title}</h4>
                                                        <p class="text-sm text-purple-600 font-semibold">${reward.cost} XP</p>
                                                    </div>
                                                </div>
                                                <button class="bg-purple-600 text-white px-4 py-2 rounded-lg text-sm hover:opacity-90">
                                                    Échanger
                                                </button>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderLiveStream() {
                return `
                    <div class="fixed inset-0 bg-gray-900 z-50">
                        <!-- Vidéo principale -->
                        <div class="relative h-2/3 bg-gradient-to-br from-purple-900 to-pink-900 flex items-center justify-center">
                            <div class="text-center">
                                <div class="inline-block relative mb-4">
                                    <img src="${this.user.avatar}" alt="" class="w-32 h-32 rounded-full border-4 border-white" />
                                    <span class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-3 py-1 rounded-full text-sm font-semibold animate-pulse">
                                        🔴 EN DIRECT
                                    </span>
                                </div>
                                <h2 class="text-white text-3xl font-bold mb-2">Votre Live Stream</h2>
                                <p class="text-white text-lg opacity-90">👥 234 spectateurs</p>
                            </div>

                            <!-- Badge live -->
                            <div class="absolute top-4 left-4 bg-red-600 text-white px-4 py-2 rounded-full font-semibold flex items-center gap-2">
                                <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span>
                                LIVE
                            </div>

                            <!-- Stats en direct -->
                            <div class="absolute top-4 right-4 space-y-2">
                                <div class="bg-black bg-opacity-50 text-white px-4 py-2 rounded-full backdrop-blur-sm">
                                    ⏱️ 12:34
                                </div>
                                <div class="bg-black bg-opacity-50 text-white px-4 py-2 rounded-full backdrop-blur-sm">
                                    ❤️ 1.2K
                                </div>
                            </div>

                            <!-- Bouton fermer -->
                            <button
                                onclick="app.showLiveStream = false; app.render();"
                                class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full font-semibold hover:bg-red-700"
                            >
                                Terminer le live
                            </button>
                        </div>

                        <!-- Chat et contrôles -->
                        <div class="h-1/3 bg-gray-800 flex">
                            <!-- Chat en direct -->
                            <div class="flex-1 flex flex-col border-r border-gray-700">
                                <div class="p-4 border-b border-gray-700">
                                    <h3 class="text-white font-bold">💬 Chat en direct</h3>
                                </div>
                                <div class="flex-1 overflow-y-auto p-4 space-y-3">
                                    ${[
                                        { user: 'Alex', message: 'Super live ! 🔥', avatar: 'https://ui-avatars.com/api/?name=Alex' },
                                        { user: 'Marie', message: 'Excellent contenu !', avatar: 'https://ui-avatars.com/api/?name=Marie' },
                                        { user: 'Sophie', message: '👏👏👏', avatar: 'https://ui-avatars.com/api/?name=Sophie' }
                                    ].map(msg => `
                                        <div class="flex items-start gap-2">
                                            <img src="${msg.avatar}" alt="" class="w-8 h-8 rounded-full" />
                                            <div>
                                                <span class="text-purple-400 font-semibold text-sm">${msg.user}</span>
                                                <p class="text-white text-sm">${msg.message}</p>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="p-4 border-t border-gray-700">
                                    <input
                                        type="text"
                                        placeholder="Envoyer un message..."
                                        class="w-full bg-gray-700 text-white px-4 py-2 rounded-full focus:outline-none"
                                    />
                                </div>
                            </div>

                            <!-- Contrôles -->
                            <div class="w-80 p-6 bg-gray-900">
                                <h3 class="text-white font-bold mb-4">Contrôles du live</h3>
                                <div class="space-y-3">
                                    <button class="w-full flex items-center justify-between bg-gray-800 text-white px-4 py-3 rounded-lg hover:bg-gray-700">
                                        <span>🎤 Audio</span>
                                        <span class="text-green-500">ON</span>
                                    </button>
                                    <button class="w-full flex items-center justify-between bg-gray-800 text-white px-4 py-3 rounded-lg hover:bg-gray-700">
                                        <span>📹 Caméra</span>
                                        <span class="text-green-500">ON</span>
                                    </button>
                                    <button class="w-full flex items-center justify-between bg-gray-800 text-white px-4 py-3 rounded-lg hover:bg-gray-700">
                                        <span>🖥️ Partage d'écran</span>
                                        <span class="text-gray-500">OFF</span>
                                    </button>
                                    <button class="w-full flex items-center justify-between bg-gray-800 text-white px-4 py-3 rounded-lg hover:bg-gray-700">
                                        <span>💬 Chat</span>
                                        <span class="text-green-500">ON</span>
                                    </button>
                                    <button class="w-full bg-purple-600 text-white px-4 py-3 rounded-lg hover:opacity-90">
                                        Inviter des spectateurs
                                    </button>
                                </div>

                                <!-- Stats -->
                                <div class="mt-6 bg-gray-800 rounded-lg p-4">
                                    <h4 class="text-white font-semibold mb-3">Statistiques</h4>
                                    <div class="space-y-2 text-sm text-gray-300">
                                        <div class="flex justify-between">
                                            <span>Spectateurs max</span>
                                            <span class="font-semibold">234</span>
                                        </div>
                                        <div class="flex justify-between">
                                            <span>J'aime</span>
                                            <span class="font-semibold">1.2K</span>
                                        </div>
                                        <div class="flex justify-between">
                                            <span>Messages</span>
                                            <span class="font-semibold">456</span>
                                        </div>
                                        <div class="flex justify-between">
                                            <span>Partages</span>
                                            <span class="font-semibold">89</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderAIAssistant() {
                return `
                    <div class="fixed bottom-4 right-4 w-96 bg-white rounded-2xl shadow-2xl z-50 flex flex-col" style="height: 600px">
                        <!-- Header -->
                        <div class="bg-gradient-to-r from-purple-600 to-pink-600 text-white p-4 rounded-t-2xl flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-2xl">
                                    🤖
                                </div>
                                <div>
                                    <h3 class="font-bold">Assistant IA</h3>
                                    <p class="text-xs opacity-90">En ligne</p>
                                </div>
                            </div>
                            <button
                                onclick="app.showAIAssistant = false; app.render();"
                                class="hover:opacity-75"
                            >
                                <span class="text-2xl">✕</span>
                            </button>
                        </div>

                        <!-- Messages -->
                        <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
                            ${this.aiMessages.map(msg => `
                                <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}">
                                    <div class="${msg.role === 'user' ? 'bg-purple-600 text-white' : 'bg-white'} rounded-2xl px-4 py-3 max-w-[80%] shadow-sm">
                                        <p class="text-sm">${msg.content}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <!-- Suggestions rapides -->
                        <div class="p-3 border-t border-gray-200 bg-white">
                            <div class="flex gap-2 overflow-x-auto pb-2">
                                ${[
                                    'Optimiser mon blog',
                                    'Idées de contenu',
                                    'Analyser mes stats',
                                    'Traduire un texte'
                                ].map(suggestion => `
                                    <button class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-xs whitespace-nowrap hover:bg-gray-200 transition-colors">
                                        ${suggestion}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Input -->
                        <div class="p-4 border-t border-gray-200 bg-white rounded-b-2xl">
                            <div class="flex items-center gap-2">
                                <input
                                    type="text"
                                    placeholder="Posez votre question..."
                                    class="flex-1 px-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:border-purple-500"
                                />
                                <button class="bg-gradient-to-r from-purple-600 to-pink-600 text-white p-3 rounded-full hover:opacity-90">
                                    ➤
                                </button>
                            </div>
                            <p class="text-xs text-gray-500 mt-2 text-center">
                                ⚡ Propulsé par l'IA de dernière génération
                            </p>
                        </div>
                    </div>
                `;
            },

            renderStoryViewer() {
                const currentStory = this.stories.find(s => s.hasStory && !s.isYou);
                return `
                    <div class="fixed inset-0 bg-black z-50 flex items-center justify-center">
                        <div class="relative w-full max-w-md h-full bg-gray-900">
                            <!-- Progress bars -->
                            <div class="absolute top-2 left-0 right-0 flex gap-1 px-2 z-10">
                                ${[1, 2, 3].map((_, i) => `
                                    <div class="flex-1 h-1 bg-gray-600 rounded-full overflow-hidden">
                                        <div class="h-full bg-white ${i === 0 ? 'w-full' : 'w-0'} transition-all duration-3000"></div>
                                    </div>
                                `).join('')}
                            </div>

                            <!-- Header -->
                            <div class="absolute top-6 left-0 right-0 flex items-center justify-between px-4 z-10">
                                <div class="flex items-center gap-2">
                                    <img src="${currentStory.avatar}" alt="" class="w-10 h-10 rounded-full border-2 border-white" />
                                    <div>
                                        <p class="text-white font-semibold text-sm">${currentStory.user}</p>
                                        <p class="text-white text-xs opacity-75">Il y a 2h</p>
                                    </div>
                                </div>
                                <button
                                    onclick="app.showStories = false; app.render();"
                                    class="text-white text-2xl hover:opacity-75"
                                >
                                    ✕
                                </button>
                            </div>

                            <!-- Story content -->
                            <div class="absolute inset-0 bg-gradient-to-br from-purple-600 to-pink-600 flex items-center justify-center">
                                <div class="text-center text-white p-8">
                                    <h2 class="text-4xl font-bold mb-4">🎨 Story Demo</h2>
                                    <p class="text-xl">Nouvelle fonctionnalité disponible !</p>
                                </div>
                            </div>

                            <!-- Navigation -->
                            <div class="absolute inset-0 flex">
                                <button class="flex-1" onclick="console.log('Prev story')"></button>
                                <button class="flex-1" onclick="console.log('Next story')"></button>
                            </div>

                            <!-- Reply input -->
                            <div class="absolute bottom-0 left-0 right-0 p-4">
                                <div class="flex items-center gap-2 bg-white bg-opacity-20 backdrop-blur-sm rounded-full px-4 py-3">
                                    <input
                                        type="text"
                                        placeholder="Répondre à ${currentStory.user}..."
                                        class="flex-1 bg-transparent text-white placeholder-white placeholder-opacity-75 focus:outline-none"
                                    />
                                    <button class="text-white text-xl">❤️</button>
                                    <button class="text-white text-xl">➤</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderCreateStory() {
                return `
                    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                        <div class="bg-white rounded-2xl max-w-2xl w-full">
                            <div class="border-b border-gray-200 p-4 flex items-center justify-between">
                                <h2 class="text-xl font-bold">📸 Créer une Story</h2>
                                <button
                                    onclick="app.showCreateStory = false; app.render();"
                                    class="text-gray-500 hover:text-gray-700 text-2xl"
                                >
                                    ✕
                                </button>
                            </div>

                            <div class="p-6">
                                <!-- Options de création -->
                                <div class="grid grid-cols-3 gap-4 mb-6">
                                    <button class="border-2 border-gray-200 rounded-xl p-6 hover:border-purple-500 hover:bg-purple-50 transition-all text-center">
                                        <span class="text-4xl block mb-2">📷</span>
                                        <p class="font-semibold">Photo</p>
                                    </button>
                                    <button class="border-2 border-gray-200 rounded-xl p-6 hover:border-pink-500 hover:bg-pink-50 transition-all text-center">
                                        <span class="text-4xl block mb-2">🎥</span>
                                        <p class="font-semibold">Vidéo</p>
                                    </button>
                                    <button class="border-2 border-gray-200 rounded-xl p-6 hover:border-blue-500 hover:bg-blue-50 transition-all text-center">
                                        <span class="text-4xl block mb-2">✍️</span>
                                        <p class="font-semibold">Texte</p>
                                    </button>
                                </div>

                                <!-- Aperçu -->
                                <div class="bg-gradient-to-br from-purple-600 to-pink-600 rounded-xl aspect-[9/16] max-w-sm mx-auto mb-6 flex items-center justify-center">
                                    <p class="text-white text-xl">Aperçu de votre story</p>
                                </div>
